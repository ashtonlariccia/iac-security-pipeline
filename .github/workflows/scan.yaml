name: IaC Security Scan

on:
  push:
    paths:
      - '**.tf'

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Scan IaC with Groq
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          TF_FILES=$(find . -name "*.tf" | xargs cat)
          
          RESPONSE=$(curl -s https://api.groq.com/openai/v1/chat/completions \
            -H "Authorization: Bearer $GROQ_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "model": "llama-3.3-70b-versatile",
              "messages": [
                {
                  "role": "system",
                  "content": "You are a cloud security expert. Analyze the provided Terraform IaC for security vulnerabilities. List any issues found with severity (HIGH/MEDIUM/LOW) and explain each. If no issues found, say PASSED."
                },
                {
                  "role": "user",
                  "content": "Analyze this Terraform code for security vulnerabilities:\n'"$TF_FILES"'"
                }
              ]
            }')
          
          echo "$RESPONSE" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          result = data['choices'][0]['message']['content']
          print(result)
          if 'HIGH' in result:
              sys.exit(1)
          "