name: IaC Security Scan

on:
  push:
    paths:
      - '**.tf'

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Scan IaC with Groq
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          pip install groq -q
          python3 scripts/scan.py