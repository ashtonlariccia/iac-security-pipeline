name: IaC Security Scan

on:
  push:
    paths:
      - '**.tf'

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Scan IaC with Groq
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          pip install groq -q
          python3 << 'EOF'
          import os, sys, glob
          from groq import Groq

          client = Groq(api_key=os.environ["GROQ_API_KEY"])

          tf_files = glob.glob("**/*.tf", recursive=True)
          tf_content = ""
          for f in tf_files:
              tf_content += f"\n# File: {f}\n" + open(f).read()

          response = client.chat.completions.create(
              model="llama-3.3-70b-versatile",
              messages=[
                  {"role": "system", "content": open("prompts/system.txt").read()},
                  {"role": "user", "content": f"Analyze this Terraform code:\n{tf_content}"}
              ]
          )

          result = response.choices[0].message.content
          print(result)
          if "HIGH" in result:
              sys.exit(1)
          EOF